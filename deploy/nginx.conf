# /etc/nginx/sites-available/research-api
# Nginx reverse proxy for the Multi-Agent Research System.
#
# Features:
# - Proxies port 80 → uvicorn on 127.0.0.1:8000
# - Rate limiting: 10 req/s per IP, burst 20
# - Security headers
# - Large timeout for long research jobs

# Rate limiting zone: 10 requests/second per client IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check — no rate limit
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints — rate limited
    location / {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for research jobs (can take 30-60s)
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Max request body size
        client_max_body_size 1m;
    }

    # Block common exploit paths
    location ~ /\. {
        deny all;
        return 404;
    }
}
